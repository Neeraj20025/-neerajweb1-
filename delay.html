<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Product Loading</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

body{
background:#f8f9fa;
font-family:Arial;
}

.product-card{
display:none;
transition:0.3s;
}

.product-card:hover{
transform:translateY(-6px);
}

.price{
color:#0d6efd;
font-weight:bold;
font-size:18px;
}

.load-btn{
padding:12px 30px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container py-5 text-center">

<h1 class="mb-3">Product Loading Demo</h1>

<p class="text-muted">
Click the button to load products one by one using jQuery delay().
</p>

<button id="loadProducts" class="btn btn-success load-btn mt-2">
Load Products
</button>

<div class="row mt-5 g-4">

<!-- Product 1 -->

<div class="col-12 col-sm-6 col-lg-3">
<div class="card product-card" id="p1">
<img src="images/jq.jfif" class="card-img-top">
<div class="card-body">
<h5 class="card-title">Nature</h5>
<p class="price">
</div>
</div>
</div>

<!-- Product 2 -->

<div class="col-12 col-sm-6 col-lg-3">
<div class="card product-card" id="p2">
<img src="images/jq3.jpg" class="card-img-top">
<div class="card-body">
<h5 class="card-title">Mountains</h5>
<p class="price">
</div>
</div>
</div>

<!-- Product 3 -->

<div class="col-12 col-sm-6 col-lg-3">
<div class="card product-card" id="p3">
<img src="images/jq4.jpg" class="card-img-top">
<div class="card-body">
<h5 class="card-title">Sky</h5>
<p class="price">
</div>
</div>
</div>

<!-- Product 4 -->

<div class="col-12 col-sm-6 col-lg-3">
<div class="card product-card" id="p4">
<img src="images/jq5.jpg" class="card-img-top">
<div class="card-body">
<h5 class="card-title">Living hood</h5>
<p class="price">
</div>
</div>
</div>

</div>

</div>

<script>

$(document).ready(function(){

$("#loadProducts").click(function(){

$("#p1").delay(400).fadeIn(300);

$("#p2").delay(1000).fadeIn(300);

$("#p3").delay(1600).fadeIn(300);

$("#p4").delay(2200).fadeIn(300);

});

});

</script>

</body>
</html>
