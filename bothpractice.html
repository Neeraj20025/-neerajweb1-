 *{

.wave {
    background: rgb(255 255 255 / 25%);
    border-radius: 1000% 1000% 0 0;
    position: fixed;
    width: 200%;
    height: 12em;
    animation: wave 10s -3s linear infinite;
    transform: translate3d(0, 0, 0);
    opacity: 0.8;
    bottom: 0;
    left: 0;
    z-index: -1;
}


.wave:nth-of-type(2) {
    bottom: -1.25em;
    animation: wave 18s linear reverse infinite;
    opacity: 0.8;
}

.wave:nth-of-type(3) {
    bottom: -2.5em;
    animation: wave 20s -1s reverse infinite;
    opacity: 0.9;

body {

/* ================= CONTAINER ================= */
.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:40px;
max-width:900px;
margin:auto;
padding:40px 20px;
}

.cursor-box{
background:#16215a;
border-radius:15px;
height:200px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-decoration:none;
color:white;
transition:0.3s;
position:relative;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.cursor-box i{
font-size:50px;
margin-bottom:10px;
}

.cursor-box h3{
font-size:24px;
margin-bottom:5px;
}

.cursor-box p{
font-size:14px;
opacity:0.8;
}

/* Hover glow */

.cursor-box:hover{
transform:translateY(-8px);
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* Different glow colors */

.html-box:hover{
box-shadow:0 0 25px #e34c26;
}

.js-box:hover{
box-shadow:0 0 25px #f7df1e;
}

.boot-box:hover{
box-shadow:0 0 25px #7952b3;
}

.jquery-box:hover{
box-shadow:0 0 25px #0769ad;
}

/* Mobile */

@media(max-width:600px){

.container{
grid-template-columns:1fr;
gap:25px;
}

.cursor-box{
height:160px;
}

}

.wait {
    cursor: wait;
    background:#16215a;
    border: 2px solid #ff4081;
}

.wait:hover {
    animation: pulse 1.5s infinite;
}


.cell {
    cursor: cell;
    background:#16215a;
    border: 2px solid #009688;
}
.cell:hover {
    transform: scale(1.05);
    clip-path: polygon(10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%);
}



/* Animations */
@keyframes pulse {
    0% { transform: scale(1.05); }
    50% { transform: scale(1); }
    100% { transform: scale(1.05); }
}

@keyframes shake {
    0%, 100% { transform: translateX(0) scale(1.05); }
    25% { transform: translateX(-5px) scale(1.05); }
    75% { transform: translateX(5px) scale(1.05); }
}

@keyframes moveAround {
    0% { transform: translate(0, 0) scale(1.05); }
    25% { transform: translate(5px, -5px) scale(1.05); }
    50% { transform: translate(0, 0) scale(1.05); }
    75% { transform: translate(-5px, 5px) scale(1.05); }
    100% { transform: translate(0, 0) scale(1.05); }
}

@media (max-width: 768px) {
    .container {
        grid-template-columns: repeat(3, 1fr);
    }
    .cursor-box {
        width: 120px;
        height: 120px;
    }
}

@media (max-width: 480px) {
    .container {
        grid-template-columns: repeat(2, 1fr);
    }
    .cursor-box {
        width: 140px;
        height: 140px;
    }


@keyframes gradient {
    0% {
        background-position: 0% 0%;
    }
    50% {
        background-position: 100% 100%;
    }
    100% {
        background-position: 0% 0%;
    }
}
    @keyframes wave {
    2% {
        transform: translateX(1);
    }

    25% {
        transform: translateX(-25%);
    }

    50% {
        transform: translateX(-50%);
    }

    75% {
        transform: translateX(-25%);
    }

    100% {
        transform: translateX(1);
    } 

}
@media (max-width: 768px) {
    .container {
        grid-template-columns: repeat(2, 1fr);
        gap: 40px;
    }
}

@media (max-width: 480px) {
    .container {
        grid-template-columns: 1fr;
    }
}

}



@keyframes animate {
    0%{
        transform: translateY(0) rotate(0deg);
        opacity: 1;
        border-radius: 0;
    }
    100%{
        transform: translateY(-1000px) rotate(720deg);
        opacity: 0;
        border-radius: 50%;
    }


    
}
