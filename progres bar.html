<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive Auto Progress Bars</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
}

/* normal progress */

.progress{
height:25px;
background:#1e293b;
}

.progress-bar{
background:linear-gradient(90deg,#00c6ff,#0072ff);
}


/* 3D bar */

.progress3d{
height:25px;
background:#222;
border-radius:20px;
overflow:hidden;
box-shadow: inset 0 3px 8px rgba(0,0,0,0.6);
}

.bar3d{
height:100%;
width:0%;
background:linear-gradient(45deg,#ff512f,#dd2476);
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}


/* circle */

.circle{
width:140px;
height:140px;
border-radius:50%;
border:10px solid #1e293b;
position:relative;
margin:auto;
}

.circle span{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:22px;
}


/* animated ring */

.ring{
width:150px;
height:150px;
border-radius:50%;
background:conic-gradient(#00f2fe 0deg,#1e293b 0deg);
display:flex;
align-items:center;
justify-content:center;
margin:auto;
}

.ring-inner{
width:110px;
height:110px;
background:#0f172a;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

</style>
</head>

<body>

<div class="container py-5">

<h2 class="text-center mb-5">Responsive Auto Progress Bars</h2>

<div class="row g-4">

<!-- Auto Progress -->

<div class="col-12 col-md-6">
<h5>Automatic Progress</h5>

<div class="progress">
<div id="autoBar" class="progress-bar"></div>
</div>
</div>


<!-- 3D Progress -->

<div class="col-12 col-md-6">
<h5>🔥 3D Progress</h5>

<div class="progress3d">
<div id="bar3d" class="bar3d"></div>
</div>
</div>


<!-- Circular -->

<div class="col-12 col-md-6 text-center">
<h5>🔵 Circular Progress</h5>

<div class="circle mt-3">
<span id="circleText">0%</span>
</div>
</div>


<!-- Animated Ring -->

<div class="col-12 col-md-6 text-center">
<h5>📈 Circular Animated Ring</h5>

<div id="ring" class="ring mt-3">
<div id="ringText" class="ring-inner">0%</div>
</div>
</div>

</div>

</div>

<script>

let width=0

setInterval(()=>{

width++

if(width>100){
width=0
}

/* normal */

document.getElementById("autoBar").style.width=width+"%"
document.getElementById("autoBar").innerText=width+"%"

/* 3d */

document.getElementById("bar3d").style.width=width+"%"

/* circle */

document.getElementById("circleText").innerText=width+"%"

/* ring */

document.getElementById("ringText").innerText=width+"%"
document.getElementById("ring").style.background =
`conic-gradient(#00f2fe ${width*3.6}deg,#1e293b ${width*3.6}deg)`

},80)

</script>

</body>
</html>
